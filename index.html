<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fack You 😎</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(270deg, #ff0000, #000000, #ff0000);
        background-size: 600% 600%;
        animation: bgMove 8s ease infinite;
        overflow: hidden;
    }

    @keyframes bgMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    h1 {
        font-size: 80px;
        color: white;
        text-transform: uppercase;
        letter-spacing: 5px;
        text-shadow: 0 0 20px red, 0 0 40px black;
        animation: glow 1.5s infinite alternate;
        cursor: pointer;
        transition: transform 0.3s;
    }

    h1:hover {
        transform: scale(1.1) rotate(2deg);
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px red, 0 0 20px red;
        }
        to {
            text-shadow: 0 0 30px white, 0 0 60px red;
        }
    }

    .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        top: 0;
        left: 0;
    }

    .particle {
        position: absolute;
        width: 5px;
        height: 5px;
        background: white;
        opacity: 0.7;
        border-radius: 50%;
        animation: fall linear infinite;
    }

    @keyframes fall {
        from {
            transform: translateY(-10vh);
        }
        to {
            transform: translateY(110vh);
        }
    }

</style>
</head>

<body>

<div class="particles" id="particles"></div>

<h1 onclick="changeText()">Fack You 😈</h1>

<script>
    function changeText() {
        const text = document.querySelector("h1");

        const words = [
            "Fack You 😈",
            "Try Again 😎",
            "No Chance 🔥",
            "Go Away 🚫",
            "Boom 💥"
        ];

        let random = Math.floor(Math.random() * words.length);
        text.innerText = words[random];
    }

    // Particle generator
    const container = document.getElementById("particles");

    for (let i = 0; i < 50; i++) {
        let p = document.createElement("div");
        p.classList.add("particle");

        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (Math.random() * 3 + 2) + "s";
        p.style.opacity = Math.random();

        container.appendChild(p);
    }
</script>

</body>
</html>
